<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opson — Σύντομα κοντά σας</title>
  <meta name="description" content="Opson — Η αγορά για φρέσκα, τοπικά ελληνικά προϊόντα απευθείας από τους παραγωγούς. Σύντομα κοντά σας." />
  <meta property="og:title" content="Opson — Σύντομα κοντά σας" />
  <meta property="og:description" content="Φρέσκα, τοπικά ελληνικά προϊόντα απευθείας από τους παραγωγούς." />
  <meta property="og:type" content="website" />
  <link rel="icon" type="image/svg+xml" href="assets/opson-mark.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:  #2e5e3e;
      --green-mid:   #4a7c59;
      --cream:       #faf5eb;
      --text-dark:   #2a1f14;
      --text-mid:    #5a4030;
      --text-light:  #8a7060;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    .logo {
      width: 220px;
      max-width: 70%;
      height: auto;
      margin: 0 auto 2.5rem;
      display: block;
    }

    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      color: var(--green-dark);
    }

    .lead {
      font-size: 1.05rem;
      line-height: 1.6;
      color: var(--text-mid);
      margin-bottom: 2.5rem;
    }

    form {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    input[type="email"] {
      flex: 1 1 240px;
      padding: 0.9rem 1.1rem;
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 10px;
      font-size: 1rem;
      background: #fff;
      color: var(--text-dark);
      font-family: inherit;
      transition: border-color 0.15s;
    }

    input[type="email"]:focus {
      outline: none;
      border-color: var(--green-mid);
    }

    input[type="email"]:disabled {
      background: #f5efe2;
      cursor: not-allowed;
    }

    button {
      padding: 0.9rem 1.5rem;
      border: 0;
      border-radius: 10px;
      background: var(--green-dark);
      color: #fff;
      font-size: 1rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.05s;
    }

    button:hover:not(:disabled) { background: var(--green-mid); }
    button:active:not(:disabled) { transform: scale(0.98); }

    button:disabled {
      background: #b8b0a0;
      cursor: not-allowed;
    }

    .form-note {
      margin-top: 0.9rem;
      font-size: 0.85rem;
      color: var(--text-light);
    }

    footer {
      padding: 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-light);
    }

    footer a {
      color: var(--text-mid);
      text-decoration: none;
      margin: 0 0.5rem;
    }
    footer a:hover { color: var(--green-dark); }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <img src="assets/opson-logo.svg" alt="Opson" class="logo" />

      <h1>Σύντομα κοντά σας</h1>

      <p class="lead">
        Η Opson είναι μια νέα αγορά για φρέσκα, τοπικά ελληνικά προϊόντα,
        απευθείας από τους παραγωγούς στο τραπέζι σας.
      </p>

      <form id="signup" novalidate>
        <input
          type="email"
          name="email"
          placeholder="Το email σας"
          aria-label="Email"
          disabled
        />
        <button type="submit" disabled>Ενημερώστε με</button>
      </form>
      <p class="form-note">Η εγγραφή ανοίγει σύντομα.</p>
    </div>
  </main>

  <footer>
    <span>© <span id="year"></span> Opson</span>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
