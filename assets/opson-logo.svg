<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" role="img" aria-label="Opson">
  <title>Opson</title>
  <!-- circular mark -->
  <g>
    <circle cx="32" cy="32" r="28" fill="#2e5e3e"/>
    <circle cx="32" cy="32" r="28" fill="none" stroke="#7aad6e" stroke-width="1" opacity="0.45"/>
    <!-- olive sprig -->
    <g transform="translate(32 32)" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 -18 C-2 -10 -2 -2 0 8" stroke="#d4ead4" stroke-width="1.6" fill="none"/>
      <ellipse cx="-8" cy="-12" rx="6.5" ry="2.8" fill="#7aad6e" transform="rotate(-38 -8 -12)"/>
      <ellipse cx="8"  cy="-6"  rx="6.5" ry="2.8" fill="#d4ead4" transform="rotate(38 8 -6)"/>
      <ellipse cx="-8" cy="0"   rx="6.5" ry="2.8" fill="#7aad6e" transform="rotate(-38 -8 0)"/>
      <ellipse cx="7"  cy="6"   rx="5.5" ry="2.4" fill="#d4ead4" transform="rotate(38 7 6)"/>
      <circle cx="0" cy="-19" r="2.6" fill="#d48b2a"/>
    </g>
  </g>
  <!-- wordmark -->
  <text x="76" y="44"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-weight="800"
        font-size="34"
        fill="#2e5e3e"
        letter-spacing="-1">Opson<tspan fill="#d48b2a">.</tspan></text>
