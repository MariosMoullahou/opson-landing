# /etc/nginx/sites-available/eopson
# Coming-soon landing page for eopson.gr
# Static-only: served directly from /home/Documents/eopson/

server {
    listen 443 ssl;
    listen 80;
    server_name eopson.gr www.eopson.gr;

    # Reuse the same self-signed cert as sheep.meston.gr.
    # Cloudflare proxy presents a valid cert to visitors;
    # this only secures the Cloudflare <-> origin hop.
    # Set Cloudflare SSL/TLS mode to "Full" (not "Full strict").
    ssl_certificate     /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    root  /home/Documents/eopson;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # Cache static assets aggressively (logos, css, etc.)
    location ~* \.(svg|png|jpg|jpeg|webp|css|js|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
